# supabase/config.toml
# Reference: https://supabase.com/docs/reference/cli/config

# ─────────────────────────────────────────────────────────────────────
# PROJECT CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[project]
# Your Supabase project ID
# Get from: https://app.supabase.com/project/[project-id]/settings/general
project_id = "owixuzehqiwfrfzitjoe"

# ─────────────────────────────────────────────────────────────────────
# API CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[api]
# Port for local API server
port = 54321
# Schemas to expose in your API
schemas = ["public", "storage", "graphql_public"]
# Extra schemas to add to the search_path
extra_search_path = ["public", "extensions"]
# Maximum rows returned from a query
max_rows = 1000

# ─────────────────────────────────────────────────────────────────────
# DATABASE CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[db]
# Port for local PostgreSQL
port = 54322
# Shadow database port for migrations
shadow_port = 54320
# Database major version
major_version = 15

[db.pooler]
# Enable connection pooler
enabled = false
# Port for connection pooler
port = 54329
# Pool mode (transaction or session)
pool_mode = "transaction"
# Default pool size
default_pool_size = 20
# Max client connections
max_client_conn = 100

[db.seed]
# Enable seed data
enabled = true
# Seed file paths
sql_paths = ["./seed.sql"]

# ─────────────────────────────────────────────────────────────────────
# AUTH CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[auth]
# Enable auth service
enabled = true
# Site URL for redirects
site_url = "http://localhost:3000"
# Additional redirect URLs
additional_redirect_urls = ["https://localhost:3000"]
# JWT expiry in seconds
jwt_expiry = 3600
# Enable new user signups
enable_signup = true
# Enable anonymous sign-ins
enable_anonymous_sign_ins = false

[auth.email]
# Enable email signups
enable_signup = true
# Require confirmation for email changes
double_confirm_changes = true
# Require email confirmation before sign in
enable_confirmations = false
# OTP length
otp_length = 6
# OTP expiry in seconds
otp_expiry = 3600

[auth.sms]
# Enable SMS signups
enable_signup = true
# Require SMS confirmation before sign in
enable_confirmations = false

[auth.rate_limit]
# Rate limits per IP address
email_sent = 2
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30

# ─────────────────────────────────────────────────────────────────────
# STUDIO DASHBOARD CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[studio]
# Enable Studio UI
enabled = true
# Port for Studio UI
port = 54323
# API URL for Studio
api_url = "http://localhost"

# ─────────────────────────────────────────────────────────────────────
# REALTIME CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[realtime]
# Enable Realtime service
enabled = true
# IP version
ip_version = "IPv6"

# ─────────────────────────────────────────────────────────────────────
# STORAGE CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[storage]
# Enable Storage service
enabled = true
# Maximum file size
file_size_limit = "50MiB"

# ─────────────────────────────────────────────────────────────────────
# EDGE FUNCTIONS CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[edge_runtime]
# Enable Edge Runtime
enabled = true
# Request handling policy
policy = "oneshot"
# Chrome inspector port for debugging
inspector_port = 8083

# ─────────────────────────────────────────────────────────────────────
# EDGE FUNCTIONS (Custom Configuration)
# ─────────────────────────────────────────────────────────────────────

# ── verify-game-result ─────────────────────────────────────────────
[functions.verify-game-result]
# Public access for Switchboard integration
verify_jwt = false

# ── verify-results ──────────────────────────────────────────────────
[functions.verify-results]
# Cron uses x-cron-secret header
verify_jwt = false

# ── distribute-rewards ──────────────────────────────────────────────
[functions.distribute-rewards]
# Cron uses x-cron-secret header
verify_jwt = false

# ─────────────────────────────────────────────────────────────────────
# ANALYTICS CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[analytics]
# Enable Logflare service (local development)
enabled = false
# Port for Logflare
port = 54327
# Vector ingest port
vector_port = 54328
# Backend
backend = "postgres"

# ─────────────────────────────────────────────────────────────────────
# EMAIL TESTING (Local Development)
# ─────────────────────────────────────────────────────────────────────

[inbucket]
# Enable InBucket email testing
enabled = true
# Web interface port
port = 54324
# SMTP port
smtp_port = 54325
# POP3 port
pop3_port = 54326
# Admin email
admin_email = "admin@email.com"
# Sender name
sender_name = "Admin"
