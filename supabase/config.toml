# supabase/config.toml
# Reference: https://supabase.com/docs/reference/cli/config

# ─────────────────────────────────────────────────────────────────────
# PROJECT CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

project_id = "owixuzehqiwfrfzitjoe"

# ─────────────────────────────────────────────────────────────────────
# API CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# ─────────────────────────────────────────────────────────────────────
# DATABASE CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

# ─────────────────────────────────────────────────────────────────────
# AUTH CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = true
enable_confirmations = false

[auth.rate_limit]
email_sent = 2
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30

# ─────────────────────────────────────────────────────────────────────
# STUDIO DASHBOARD CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

# ─────────────────────────────────────────────────────────────────────
# REALTIME CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[realtime]
enabled = true
ip_version = "IPv6"

# ─────────────────────────────────────────────────────────────────────
# STORAGE CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[storage]
enabled = true
file_size_limit = "50MiB"

# ─────────────────────────────────────────────────────────────────────
# EDGE FUNCTIONS CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083


# ─────────────────────────────────────────────────────────────────────
# ANALYTICS CONFIGURATION
# ─────────────────────────────────────────────────────────────────────

[analytics]
enabled = false
port = 54327
vector_port = 54328
backend = "postgres"

# ─────────────────────────────────────────────────────────────────────
# EMAIL TESTING (Local Development)
# ─────────────────────────────────────────────────────────────────────

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326
admin_email = "admin@email.com"
sender_name = "Admin"
